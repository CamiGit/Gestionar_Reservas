<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis reservas | Style Factory</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../../components/footer/footer.css">
    <link rel="stylesheet" href="../../components/navbar/navbar.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="misReservas.css">
</head>

<body>

    <header id="header" class="sticky-top"></header>

    <main class="mis-reservas-main">
        <div class="container-custom">
            <header class="mis-reservas-header">
                <span class="mis-reservas-eyebrow">Tu cuenta</span>
                <h1>Mis reservas</h1>
                <div class="header-line"></div>
                <p id="mis-reservas-subtitulo">Consulta las citas que has agendado en Style Factory.</p>
            </header>

            <div class="mis-reservas-panel">
                <div id="mis-reservas-carga" class="mis-reservas-estado">
                    <p>Cargando tus reservas...</p>
                </div>
                <div id="mis-reservas-error" class="mis-reservas-estado mis-reservas-error" style="display: none;"></div>
                <div id="mis-reservas-vacio" class="mis-reservas-estado" style="display: none;">
                    <p>Aún no tienes reservas registradas.</p>
                    <a href="../catalogoServicios/catalogoServicios.html" class="btn-principal">Ver servicios</a>
                </div>
                <div id="mis-reservas-contenedor" class="mis-reservas-tabla-wrap" style="display: none;">
                    <table class="mis-reservas-tabla">
                        <thead>
                            <tr>
                                <th>Servicio</th>
                                <th>Estilista</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="mis-reservas-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/da49b4fb7a.js" crossorigin="anonymous"></script>
    <script src="../../assets/js/config.js"></script>
    <script src="misReservas.js" defer></script>

</body>

</html>
