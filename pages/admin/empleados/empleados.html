<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./components/navbarAdmin/navbar_Admin.css">
  <link rel="stylesheet" href="./pages/admin/listaReservas/listaReservas.css">
  <link rel="stylesheet" href="./pages/admin/empleados/empleados.css">
  <title>Empleados</title>
</head>
<body>
  <div id="navbarAdmin-placeholder"></div>

  <section class="container py-5">
    <div class="admin-lista-reservas-panel">
      <section class="seccion-lista-reservas">

        <div class="cabecera-lista-reservas">
          <h2>LISTA DE EMPLEADOS</h2>
          <div class="linea-cabecera"></div>
          <button type="button" class="btn btn-agregar-servicio" id="btnNuevoEmpleado" title="Agregar empleado">
            <i class="fa-solid fa-plus" style="color:white"></i>
          </button>
        </div>

        <table class="table table-striped tabla-lista-reservas" style="table-layout:fixed;width:100%">
          <thead>
            <tr>
              <th style="width:10%">ID</th>
              <th style="width:22%">NOMBRE</th>
              <th style="width:25%">ESPECIALIDAD</th>
              <th style="width:13%">FOTO</th>
              <th style="width:30%">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="tabla-empleados"></tbody>
        </table>

      </section>
    </div>
  </section>

  <!-- ══════════════════════════════════════════════════════════════
       MODAL UNIFICADO: Datos + Horarios (2 pasos)
  ══════════════════════════════════════════════════════════════ -->
  <div class="modal fade" id="modalEmpleado" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">

        <!-- Encabezado con indicador de pasos -->
        <div class="modal-header emp-modal-header">
          <div>
            <h5 class="modal-title mb-1" id="tituloModalEmp">Nuevo Empleado</h5>
            <div class="pasos-indicador">
              <span class="paso-item" id="indPaso1">
                <span class="paso-num">1</span> Datos personales
              </span>
              <i class="fa-solid fa-chevron-right paso-flecha"></i>
              <span class="paso-item" id="indPaso2">
                <span class="paso-num">2</span> Horarios
              </span>
            </div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">

          <!-- ─── PASO 1: Datos del empleado ─────────────────────────── -->
          <div id="paso1">
            <input type="hidden" id="empEditId">

            <!-- Avatar + opciones de foto -->
            <div class="emp-foto-bloque mb-4">
              <!-- Preview circular -->
              <div class="emp-avatar-circle" id="empAvatarCircle">
                <img id="empPreview" src="" alt="Foto" style="display:none">
                <i class="fa-regular fa-circle-user fa-4x" id="empAvatarIcon"></i>
              </div>

              <!-- Controles de foto -->
              <div class="emp-foto-controles">
                <!-- Opción A: subir archivo -->
                <label for="empInputImagen" class="btn-cambiar-foto">
                  <i class="fa-solid fa-upload me-1"></i>
                  <span id="lblFoto">Subir archivo</span>
                </label>
                <input type="file" id="empInputImagen" accept="image/*" class="d-none">

                <div class="foto-separador"><span>o</span></div>

                <!-- Opción B: pegar URL -->
                <div class="w-100">
                  <input type="url" id="empImagenURL" class="form-control form-control-sm"
                         placeholder="Pegar URL de la imagen (https://...)">
                </div>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Nombre completo</label>
                <input type="text" class="form-control" id="empNombre" placeholder="Ej. Ana García">
                <span class="text-danger small" id="errEmpNombre"></span>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Especialidad</label>
                <input type="text" class="form-control" id="empEspecialidad" placeholder="Ej. Colorimetría">
                <span class="text-danger small" id="errEmpEspecialidad"></span>
              </div>
              <div class="col-12" id="campoUsuarioId">
                <label class="form-label fw-semibold">
                  Usuario del sistema
                  <span class="text-muted fw-normal small ms-1">(cuenta vinculada al empleado)</span>
                </label>
                <select class="form-select" id="empUsuarioId">
                  <option value="">Cargando usuarios...</option>
                </select>
                <span class="text-danger small" id="errEmpUsuarioId"></span>
              </div>
            </div>
          </div>

          <!-- ─── PASO 2: Horarios ────────────────────────────────────── -->
          <div id="paso2" style="display:none">

            <!-- Cabecera del empleado en paso 2 -->
            <div class="emp-paso2-header mb-3">
              <img id="paso2Avatar" src="" class="emp-avatar" style="display:none" alt="">
              <div class="emp-avatar-placeholder" id="paso2AvatarPh"><i class="fa-regular fa-circle-user fa-lg"></i></div>
              <div>
                <p class="mb-0 fw-bold" id="paso2Nombre"></p>
                <small class="text-muted" id="paso2Especialidad"></small>
              </div>
            </div>

            <div class="row g-3">

              <!-- Formulario agregar disponibilidad -->
              <div class="col-md-5">
                <div class="horario-form-card">
                  <h6 class="horario-card-title">
                    <i class="fa-solid fa-plus-circle me-1"></i>Agregar disponibilidad
                  </h6>
                  <div class="mb-3">
                    <label class="form-label small fw-semibold">Fecha</label>
                    <input type="date" class="form-control" id="horarioFecha">
                  </div>
                  <div class="mb-3">
                    <label class="form-label small fw-semibold">Horas disponibles</label>
                    <div class="horas-grid" id="horasCheckboxes"></div>
                  </div>
                  <button type="button" class="btn btn-guardar-horario w-100" id="btnAnadirFecha">
                    <i class="fa-solid fa-plus me-1"></i>Añadir al horario
                  </button>
                </div>
              </div>

              <!-- Lista de horarios (pendientes o existentes) -->
              <div class="col-md-7">
                <h6 class="horario-card-title" id="tituloListaHorarios">
                  <i class="fa-regular fa-calendar-check me-1"></i>Horarios agregados
                </h6>
                <div id="listaHorarios" class="horarios-lista">
                  <div class="horarios-vacio">
                    <i class="fa-regular fa-calendar-xmark fa-2x mb-2"></i>
                    <p class="mb-0 small">Aún no has agregado horarios.</p>
                  </div>
                </div>
              </div>

            </div>
          </div>

        </div><!-- /modal-body -->

        <!-- Footer dinámico -->
        <div class="modal-footer" id="empModalFooter">
          <!-- Botones inyectados por JS según el paso -->
        </div>

      </div>
    </div>
  </div>

  <!-- ── Modal Confirmar Eliminar ────────────────────────────────────────── -->
  <div class="modal fade" id="modalEliminarEmp" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
      <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
        <div class="modal-body text-center" style="padding:2.5rem 2rem 1.5rem;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(82,38,118,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;">
            <i class="fa-solid fa-user-minus fa-xl" style="color:#522676;"></i>
          </div>
          <h5 style="font-family:'Cormorant Garamond',serif;color:#1a1a2e;font-size:1.3rem;margin-bottom:.6rem;">Eliminar empleado</h5>
          <p style="color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.8rem;">¿Estás seguro de que deseas eliminar este empleado? Esta acción no se puede deshacer.</p>
          <div style="display:flex;gap:.75rem;justify-content:center;">
            <button class="btn" data-bs-dismiss="modal" style="border:1px solid #ddd;color:#555;background:#fff;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;">Cancelar</button>
            <button class="btn" id="btnConfirmarEliminarEmp" style="background:#522676;color:#fff;border:none;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;font-weight:500;">Eliminar</button>
          </div>
          <input type="hidden" id="empIdEliminar">
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./assets/js/cacheSession.js"></script>
  <script src="./assets/js/sfAlert.js"></script>
  <script type="module" src="./pages/admin/empleados/empleados.js"></script>
</body>
</html>
