<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

  <!-- iconos -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- estilos -->
  <link rel="stylesheet" href="/pages//admin/listaReservas//listaReservas.css">
  <link rel="stylesheet" href="/components/metricas/metricas.css">
  <link rel="stylesheet" href="/components/navbarAdmin/navbar_Admin.css">
  <link rel="stylesheet" href="panelControl.css">
  <link rel="stylesheet" href="/pages/admin/empleados/empleados.css">


  <title>Panel de control</title>
</head>

<body>

  <!--sidebar -->
  <div id="navbarAdmin-placeholder"></div>

  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/assets/js/cacheSession.js"></script>
<script src="/assets/js/sfAlert.js"></script>
<script type="module" src="panelControl.js"></script>
<script src="/components/metricas/metricas.js"></script>

<!-- Modal eliminar reserva -->
  <div class="modal fade" id="modalEliminarReserva" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
      <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
        <div class="modal-body text-center" style="padding:2.5rem 2rem 1.5rem;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(220,38,38,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;">
            <i class="fa-solid fa-trash fa-xl" style="color:#dc2626;"></i>
          </div>
          <h5 style="font-family:'Cormorant Garamond',serif;color:#1a1a2e;font-size:1.3rem;margin-bottom:.6rem;">Eliminar reserva</h5>
          <p style="color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.8rem;">¿Estás seguro de que deseas eliminar esta reserva? Esta acción no se puede deshacer.</p>
          <div style="display:flex;gap:.75rem;justify-content:center;">
            <button class="btn" data-bs-dismiss="modal" style="border:1px solid #ddd;color:#555;background:#fff;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;">Cancelar</button>
            <button class="btn" id="btn-confirmar-eliminar-reserva" style="background:#dc2626;color:#fff;border:none;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;font-weight:500;">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- Modal salir -->
  <div class="modal fade" id="modalSalir" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
      <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
        <div class="modal-body text-center" style="padding:2.5rem 2rem 1.5rem;">
          <div style="width:64px;height:64px;border-radius:50%;background:rgba(82,38,118,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;">
            <i class="fa-solid fa-right-from-bracket fa-xl" style="color:#522676;"></i>
          </div>
          <h5 style="font-family:'Cormorant Garamond',serif;color:#1a1a2e;font-size:1.3rem;margin-bottom:.6rem;">Salir del panel</h5>
          <p style="color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.8rem;">¿Quieres salir del panel administrador?</p>
          <div style="display:flex;gap:.75rem;justify-content:center;">
            <button type="button" class="btn" data-bs-dismiss="modal" style="border:1px solid #ddd;color:#555;background:#fff;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;">Cancelar</button>
            <button type="button" class="btn" id="btnSalirConfirmado" style="background:#522676;color:#fff;border:none;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;font-weight:500;">Salir</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
