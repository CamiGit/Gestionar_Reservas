<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>window.test = "html";</script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="/components/forms/creacionServicios/formCreacionServicios.css"
    />
    <link rel="stylesheet" href="/components/navbarAdmin/navbar_Admin.css" />
    <link
      rel="stylesheet"
      href="/pages/admin/listaServicios//listaServicios.css"
    />
    <link
      rel="stylesheet"
      href="/pages/admin/listaReservas/listaReservas.css"
    />
    <title>Lista servicios</title>
  </head>

  <body>
    <div id="navbarAdmin-placeholder"></div>
    <section class="container py-5">
      <div class="admin-lista-reservas-panel">
        <!-- Sección: Lista de servicios -->
        <section class="seccion-lista-reservas">
          <div class="cabecera-lista-reservas">
            <h2>LISTA DE SERVICIOS</h2>
            <div class="linea-cabecera"></div>
            <button
              type="button"
              class="btn btn-agregar-servicio"
              data-bs-toggle="modal"
              data-bs-target="#exampleModal"
              title="Agregar"
            >
              <i class="fa-solid fa-plus" style="color: white"></i>
            </button>

            <!-- Modal creación/edición de servicio -->
            <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
                  <div class="modal-header" style="border-bottom:1px solid #f0e6ff;padding:1.5rem 1.75rem 1rem;">
                    <h5 class="modal-title" id="exampleModalLabel" style="font-family:'Cormorant Garamond',serif;color:#522676;font-size:1.4rem;">
                      Creación de servicio
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                  </div>
                  <div class="modal-body" style="padding:1.5rem 1.75rem;">
                    <div id="form-services"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <table
            class="table table-striped tabla-lista-reservas"
            style="table-layout: fixed; width: 100%"
          >
            <thead>
              <tr>
                <th>ID</th>
                <th>SERVICIO</th>
                <th>DESCRIPCIÓN</th>
                <th>ESTADO</th>
                <th>ACCIONES</th>
              </tr>
            </thead>
            <tbody id="tabla-servicios"></tbody>
            <div class="modal fade" id="modalEliminar" tabindex="-1">
              <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
                <div class="modal-content" style="border-radius:16px;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.18);overflow:hidden;">
                  <div class="modal-body text-center" style="padding:2.5rem 2rem 1.5rem;">
                    <div style="width:64px;height:64px;border-radius:50%;background:rgba(220,38,38,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;">
                      <i class="fa-solid fa-trash fa-xl" style="color:#dc2626;"></i>
                    </div>
                    <h5 style="font-family:'Cormorant Garamond',serif;color:#1a1a2e;font-size:1.3rem;margin-bottom:.6rem;">Eliminar servicio</h5>
                    <p style="color:#555;font-size:.95rem;line-height:1.6;margin-bottom:1.8rem;">¿Estás seguro de que deseas eliminar este servicio? Esta acción no se puede deshacer.</p>
                    <div style="display:flex;gap:.75rem;justify-content:center;">
                      <button class="btn" data-bs-dismiss="modal" style="border:1px solid #ddd;color:#555;background:#fff;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;">Cancelar</button>
                      <button class="btn" id="btn-confirmar-eliminar" style="background:#dc2626;color:#fff;border:none;border-radius:8px;padding:.55rem 1.5rem;font-size:.9rem;font-weight:500;">Eliminar</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </table>
        </section>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
     <script src="/assets/js/config.js"></script>
    <script src="/assets/js/cacheSession.js"></script>
    <script type="module" src="listaServicios.js?v=2"></script>
  </body>
</html>
